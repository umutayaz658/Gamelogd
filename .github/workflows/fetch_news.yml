name: Fetch News RSS Feed Cron

on:
  schedule:
    # Her 6 saatte bir çalışır
    - cron: '0 */6 * * *'
  # GitHub paneli üzerinden manuel tetiklemeye izin verir
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger News Fetch API
        run: |
          curl -X POST "https://gamelogd-production.up.railway.app/api/news/fetch/" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Length: 0"
