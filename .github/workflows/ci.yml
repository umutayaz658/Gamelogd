name: Continuous Integration

on:
  push:
    branches: [ main, "feature/*", "fix/*" ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-ci:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Next.js Build
        run: npm run build
        working-directory: frontend

  backend-ci:
    name: Backend Check & Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Run Django System Checks
        run: python backend/manage.py check
        env:
          SECRET_KEY: 'ci-secret-key-placeholder'
          DEBUG: 'True'
          DB_NAME: 'ci_db'
          DB_USER: 'ci_user'
          DB_PASSWORD: 'ci_password'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
          CLOUDINARY_CLOUD_NAME: 'placeholder'
          CLOUDINARY_API_KEY: 'placeholder'
          CLOUDINARY_API_SECRET: 'placeholder'

      - name: Check for Uncreated Migrations
        run: python backend/manage.py makemigrations --check --dry-run
        env:
          SECRET_KEY: 'ci-secret-key-placeholder'
          DEBUG: 'True'
          DB_NAME: 'ci_db'
          DB_USER: 'ci_user'
          DB_PASSWORD: 'ci_password'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
          CLOUDINARY_CLOUD_NAME: 'placeholder'
          CLOUDINARY_API_KEY: 'placeholder'
          CLOUDINARY_API_SECRET: 'placeholder'

      - name: Run Django Tests
        run: python backend/manage.py test
        env:
          SECRET_KEY: 'ci-secret-key-placeholder'
          DEBUG: 'True'
          DB_NAME: 'ci_db'
          DB_USER: 'ci_user'
          DB_PASSWORD: 'ci_password'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
          CLOUDINARY_CLOUD_NAME: 'placeholder'
          CLOUDINARY_API_KEY: 'placeholder'
          CLOUDINARY_API_SECRET: 'placeholder'
